name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Opt into JavaScript actions on Node 24 until runner default catches up:
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      # User/Org site repo "<owner>.github.io" is served at domain root (/), not /<repo>/.
      # Using /${repo}/ there breaks JS/CSS URLs and yields a blank page.
      - name: Build
        run: |
          name="${GITHUB_REPOSITORY##*/}"
          owner="${GITHUB_REPOSITORY%%/*}"
          if [ "$name" = "${owner}.github.io" ]; then
            export BASE_PATH=/
          else
            export BASE_PATH="/$name/"
          fi
          npm run build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
